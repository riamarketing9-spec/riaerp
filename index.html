<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIA</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .logo {
    max-width: 220px;
    width: 40vw;
    height: auto;
  }
  .status {
    margin-top: 28px;
    font-size: 16px;
    letter-spacing: 0.5px;
    color: #555;
  }
  .dots span {
    display: inline-block;
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .dots span:nth-child(1) { animation-delay: -0.32s; }
  .dots span:nth-child(2) { animation-delay: -0.16s; }
  .dots span:nth-child(3) { animation-delay: 0s; }
  .dots span:nth-child(4) { animation-delay: 0.16s; }
  .dots span:nth-child(5) { animation-delay: 0.32s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
    40% { transform: translateY(-4px); opacity: 1; }
  }
</style>
</head>
<body>
  <img class="logo" src="logo.png" alt="RIA logo">
  <div class="status">ERP in process<span class="dots"><span>.</span><span>.</span><span>.</span><span>.</span><span>.</span></span></div>
</body>
</html>
